<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Mnemosyne — Sovereign AI Memory</title>
  <style>
    :root {
      --tg-theme-bg-color: #fff;
      --tg-theme-text-color: #000;
      --tg-theme-hint-color: #999;
      --tg-theme-button-color: #3390ec;
      --tg-theme-button-text-color: #fff;
      --tg-theme-secondary-bg-color: #f0f0f0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--tg-theme-bg-color);
      color: var(--tg-theme-text-color);
      height: 100vh; display: flex; flex-direction: column;
      overflow: hidden;
    }
    header {
      padding: 12px 16px; font-weight: 600; font-size: 16px;
      border-bottom: 1px solid var(--tg-theme-hint-color); opacity: 0.8;
    }
    #messages {
      flex: 1; overflow-y: auto; padding: 12px 16px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .msg { padding: 10px 14px; border-radius: 12px; max-width: 85%; word-wrap: break-word; font-size: 15px; line-height: 1.4; }
    .msg.user { align-self: flex-end; background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); }
    .msg.assistant { align-self: flex-start; background: var(--tg-theme-secondary-bg-color); color: var(--tg-theme-text-color); }
    .msg.error { align-self: center; background: #fee; color: #c00; font-size: 13px; }
    #input-area {
      display: flex; padding: 10px 12px;
      border-top: 1px solid var(--tg-theme-hint-color); opacity: 0.5;
      gap: 8px;
    }
    #input {
      flex: 1; padding: 10px 14px; border-radius: 20px; border: 1px solid var(--tg-theme-hint-color);
      font-size: 15px; outline: none; background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color);
    }
    #send-btn {
      padding: 10px 20px; border-radius: 20px; border: none;
      background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color);
      font-size: 15px; cursor: pointer; font-weight: 600;
    }
    #send-btn:disabled { opacity: 0.5; cursor: default; }
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid transparent; border-top-color: currentColor; border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header>Mnemosyne — Sovereign AI Memory</header>
  <div id="messages"></div>
  <div id="input-area">
    <input id="input" type="text" placeholder="Type a message..." autocomplete="off" />
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    // ── CONFIG ──────────────────────────────────────────
    // The operator sets this to the public HTTPS URL of the backend.
    // Example: "https://mnemosyne-backend.example.com"
    const BACKEND_URL = "https://YOUR_BACKEND_HOST";

    // ── Telegram WebApp init ────────────────────────────
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
      // Apply Telegram theme
      const root = document.documentElement.style;
      root.setProperty('--tg-theme-bg-color', tg.backgroundColor || '#fff');
      root.setProperty('--tg-theme-text-color', tg.textColor || '#000');
      root.setProperty('--tg-theme-hint-color', tg.hintColor || '#999');
      root.setProperty('--tg-theme-button-color', tg.buttonColor || '#3390ec');
      root.setProperty('--tg-theme-button-text-color', tg.buttonTextColor || '#fff');
      root.setProperty('--tg-theme-secondary-bg-color', tg.secondaryBackgroundColor || '#f0f0f0');
    } else {
      console.warn('Telegram WebApp not detected — running in plain browser. initData will be empty.');
    }

    // ── UI helpers ──────────────────────────────────────
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send-btn');

    function addMessage(text, role) {
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function setLoading(loading) {
      sendBtn.disabled = loading;
      inputEl.disabled = loading;
      if (loading) {
        sendBtn.innerHTML = '<span class="spinner"></span>';
      } else {
        sendBtn.textContent = 'Send';
      }
    }

    // ── Send ────────────────────────────────────────────
    async function sendMessage() {
      const input = inputEl.value.trim();
      if (!input) return;

      addMessage(input, 'user');
      inputEl.value = '';
      setLoading(true);

      try {
        const initData = (tg && tg.initData) ? tg.initData : '';
        const headers = {
          'Content-Type': 'application/json',
          'x-telegram-init-data': initData,
        };

        const response = await fetch(BACKEND_URL + '/turn', {
          method: 'POST',
          headers,
          body: JSON.stringify({ input }),
        });

        if (!response.ok) {
          const err = await response.json().catch(() => ({ error: response.statusText }));
          addMessage('Error: ' + (err.error || 'unknown error'), 'error');
          setLoading(false);
          return;
        }

        const data = await response.json();
        addMessage(data.reply || '(no reply)', 'assistant');
      } catch (e) {
        addMessage('Error: could not reach the backend. Check BACKEND_URL.', 'error');
      } finally {
        setLoading(false);
      }
    }

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
